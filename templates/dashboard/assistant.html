<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healix | AI Assistant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #070b0f;
            --bg2: #0d1318;
            --card: #121921;
            --rim: rgba(255, 255, 255, 0.06);
            --rim2: rgba(255, 255, 255, 0.12);
            --teal: #00e5b8;
            --teal-glo: rgba(0, 229, 184, 0.15);
            --iris: #8b78ff;
            --ink: #dce8f0;
            --ink2: #8a9baa;
            --ink3: #4d5d6a;
            --sans: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nav */
        .nav {
            height: 64px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            background: rgba(7, 11, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--rim);
            z-index: 10;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--ink);
        }

        .nl-mark {
            width: 28px;
            height: 28px;
            background: #ff3b2f;
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .nl-cross {
            width: 12px;
            height: 2px;
            background: white;
            position: relative;
        }

        .nl-cross::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 12px;
            background: white;
            left: 5px;
            top: -5px;
        }

        .nl-word {
            font-weight: 700;
            font-size: 19px;
            letter-spacing: -0.02em;
        }

        .nav-links {
            margin-left: 40px;
            display: flex;
            gap: 24px;
        }

        .nla {
            text-decoration: none;
            color: var(--ink2);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.15s;
        }

        .nla:hover,
        .nla.on {
            color: var(--ink);
        }

        /* Chat Layout */
        .chat-container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar */
        .chat-body::-webkit-scrollbar {
            width: 4px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: var(--rim2);
            border-radius: 10px;
        }

        .msg {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: msgIn 0.3s ease-out both;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-ai {
            align-self: flex-start;
        }

        .msg-user {
            align-self: flex-end;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .msg-ai .bubble {
            background: var(--card);
            border: 1px solid var(--rim);
            color: var(--ink);
            border-bottom-left-radius: 4px;
        }

        .msg-user .bubble {
            background: var(--teal);
            color: #04342c;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--ink3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .msg-user .msg-meta {
            align-self: flex-end;
        }

        /* Welcome state */
        .welcome {
            text-align: center;
            margin: auto;
            max-width: 480px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--teal-glo));
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .welcome p {
            color: var(--ink2);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Input Area */
        .input-area {
            padding: 24px 20px 40px;
            background: linear-gradient(transparent, var(--bg) 40%);
        }

        .input-box {
            background: var(--bg2);
            border: 1px solid var(--rim);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--teal);
            box-shadow: 0 0 20px rgba(0, 229, 184, 0.1);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--ink);
            padding: 10px 4px;
            font-size: 15px;
            font-family: var(--sans);
            outline: none;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--teal);
            border: none;
            color: #04342c;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* Suggestions */
        .suggest {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 12px;
        }

        .suggest::-webkit-scrollbar {
            display: none;
        }

        .s-chip {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--rim);
            border-radius: 100px;
            font-size: 13px;
            color: var(--ink2);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.15s;
        }

        .s-chip:hover {
            border-color: var(--teal);
            color: var(--ink);
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a class="nav-logo" href="/">
            <div class="nl-mark">
                <div class="nl-cross"></div>
            </div>
            <span class="nl-word">Healix</span>
        </a>
        <div class="nav-links">
            <a class="nla" href="/dashboard/patient/">My Health</a>
            <a class="nla on" href="/assistant/">AI Assistant</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-body" id="chatBody">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🤖</div>
                <h1>How can I help you today?</h1>
                <p>I'm your Healix AI assistant. I can help you understand your symptoms, check your triage history, or
                    prepare for your next appointment.</p>

                <div class="suggest">
                    <div class="s-chip" onclick="pushText('I have a severe headache')">Analyze my symptoms</div>
                    <div class="s-chip" onclick="pushText('Show my last triage result')">What was my last triage?</div>
                    <div class="s-chip" onclick="pushText('Who is my doctor?')">My doctor info</div>
                    <div class="s-chip" onclick="pushText('Tips for fever')">Health tips</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" class="chat-input" id="chatIn" placeholder="Type a message..."
                    onkeydown="if(event.key==='Enter') send()">
                <button class="send-btn" id="sendBtn" onclick="send()">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMoNdBIWdZNKJOlR7ZV-46OfFHZPwb1Wk", authDomain: "healix-d02c4.firebaseapp.com",
            projectId: "healix-d02c4", storageBucket: "healix-d02c4.firebasestorage.app",
            messagingSenderId: "783527967185", appId: "1:783527967185:web:eacf3a3f785121a0ae08f0",
            measurementId: "G-Z4TD76TGR7"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const ud = await getDoc(doc(db, 'users', user.uid));
                if (ud.exists()) {
                    userProfile = ud.data();
                    if (userProfile.role !== 'patient' && userProfile.role !== 'doctor') {
                        // Just basic check
                    }
                }
            } else {
                location.href = '/auth/login/';
            }
        });

        window.send = async function () {
            const input = document.getElementById('chatIn');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            document.getElementById('welcome').style.display = 'none';

            addMsg(text, 'user');

            const typing = addMsg('Thinking...', 'ai', true);

            try {
                // Determine if it looks like symptoms
                if (text.length > 10 && (text.includes('pain') || text.includes('fever') || text.includes('sick') || text.includes('headache'))) {
                    const res = await fetch('/api/triage/analyze/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
                        body: JSON.stringify({ symptoms: text })
                    });
                    const data = await res.json();
                    typing.remove();
                    addMsg(`I've analyzed your symptoms. This appears to be a **${data.risk_level}** risk level case. \n\n**Recommendation:** ${data.recommendation}\n\n${data.explanation}`, 'ai');
                } else if (text.toLowerCase().includes('doctor')) {
                    typing.remove();
                    addMsg("Your assigned doctor is **Dr. Sharma**. They are a General Physician at Healix. You can view their profile in your dashboard.", 'ai');
                } else if (text.toLowerCase().includes('last triage') || text.toLowerCase().includes('history')) {
                    typing.remove();
                    addMsg("I'm looking up your history. You've had **3 triage evaluations** in the last month. Your last one was classified as 'Medium' risk.", 'ai');
                } else {
                    typing.remove();
                    addMsg("I can help you with symptom analysis, checking your health stats, or giving you information about your doctor. Try asking 'I have a sore throat' or 'Who is my doctor?'.", 'ai');
                }
            } catch (e) {
                typing.remove();
                addMsg("I encountered an error while processing your request. Please try again later.", 'ai');
            }
        };

        window.pushText = (t) => {
            document.getElementById('chatIn').value = t;
            send();
        };

        function addMsg(text, role, isTemp = false) {
            const body = document.getElementById('chatBody');
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.innerHTML = `
                <div class="msg-meta">${role === 'ai' ? 'Healix AI Agent' : 'You'}</div>
                <div class="bubble">${text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>
            `;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
            return isTemp ? div : null;
        }

        function csrf() { for (const c of document.cookie.split(';')) { const [k, v] = c.trim().split('='); if (k === 'csrftoken') return decodeURIComponent(v); } return ''; }
    </script>
</body>

</html>
